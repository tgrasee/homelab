global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:

  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Host metrics via Node Exporter
  - job_name: "node_exporter"
    static_configs:
      - targets: ["node_exporter:9100"]

  # Proxmox host metrics (node_exporter installed via proxmox-base Ansible role)
  - job_name: "proxmox_host"
    static_configs:
      - targets: ["192.168.1.37:9100"]

  # Add Proxmox VE exporter here once configured (VM/LXC metrics)
  # - job_name: "proxmox_ve"
  #   static_configs:
  #     - targets: ["192.168.1.37:9221"]
