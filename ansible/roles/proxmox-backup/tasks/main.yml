---
- name: Install dependencies
  ansible.builtin.apt:
    name:
      - curl
      - gnupg
    state: present
    update_cache: true

- name: Add Proxmox Backup Server repository key
  ansible.builtin.apt_key:
    url: https://enterprise.proxmox.com/debian/proxmox-release-bookworm.gpg
    state: present

- name: Add Proxmox Backup Server no-subscription repository
  ansible.builtin.apt_repository:
    repo: "deb http://download.proxmox.com/debian/pbs bookworm pbs-no-subscription"
    state: present
    filename: pbs-no-subscription

- name: Install Proxmox Backup Server
  ansible.builtin.apt:
    name: proxmox-backup-server
    state: present
    update_cache: true

- name: Ensure PBS service is running
  ansible.builtin.systemd:
    name: proxmox-backup
    state: started
    enabled: true

- name: Create backup datastore mount point
  ansible.builtin.file:
    path: /mnt/backup
    state: directory
    mode: "0755"

- name: Format backup disk if not already formatted
  community.general.filesystem:
    fstype: ext4
    dev: /dev/sdb
    force: false

- name: Mount backup disk
  ansible.posix.mount:
    path: /mnt/backup
    src: /dev/sdb
    fstype: ext4
    opts: defaults
    state: mounted

- name: Create PBS datastore directory
  ansible.builtin.file:
    path: /mnt/backup/pbs
    state: directory
    owner: backup
    group: backup
    mode: "0755"

- name: Create PBS datastore
  ansible.builtin.command: proxmox-backup-manager datastore create main /mnt/backup/pbs
  register: datastore_result
  failed_when:
    - datastore_result.rc != 0
    - '"already exists" not in datastore_result.stderr'
  changed_when: datastore_result.rc == 0
