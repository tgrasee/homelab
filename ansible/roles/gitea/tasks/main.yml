---
- name: Create gitea directory
  ansible.builtin.file:
    path: /opt/gitea
    state: directory
    mode: "0755"

- name: Copy docker-compose.yml
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../docker/gitea/docker-compose.yml"
    dest: /opt/gitea/docker-compose.yml
    mode: "0644"

- name: Create .env from example if it does not exist
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../docker/gitea/.env.example"
    dest: /opt/gitea/.env
    force: false
    mode: "0600"

- name: Start Gitea stack
  community.docker.docker_compose_v2:
    project_src: /opt/gitea
    docker_cli: /usr/bin/docker
    state: present
