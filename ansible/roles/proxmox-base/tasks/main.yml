---
# Proxmox host base configuration: repo setup, system hardening, node_exporter

- name: Remove Proxmox enterprise repo files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/apt/sources.list.d/pve-enterprise.list
    - /etc/apt/sources.list.d/pve-enterprise.sources
    - /etc/apt/sources.list.d/ceph.list
    - /etc/apt/sources.list.d/ceph.sources

- name: Add Proxmox no-subscription community repo
  ansible.builtin.apt_repository:
    repo: "deb http://download.proxmox.com/debian/pve trixie pve-no-subscription"
    filename: pve-no-subscription
    state: present

- name: Upgrade all packages
  ansible.builtin.apt:
    upgrade: dist
    update_cache: true

- name: Install base packages
  ansible.builtin.apt:
    name:
      - curl
      - wget
      - vim
      - htop
      - net-tools
      - gnupg
    state: present

- name: Disable SSH password authentication
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^#?PasswordAuthentication"
    line: "PasswordAuthentication no"
  notify: Restart sshd

- name: Restrict root SSH to key-based login only
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^#?PermitRootLogin"
    line: "PermitRootLogin prohibit-password"
  notify: Restart sshd

- name: Download node_exporter
  ansible.builtin.get_url:
    url: >-
      https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version }}/node_exporter-{{ node_exporter_version }}.linux-amd64.tar.gz
    dest: /tmp/node_exporter.tar.gz
    mode: "0644"

- name: Extract node_exporter
  ansible.builtin.unarchive:
    src: /tmp/node_exporter.tar.gz
    dest: /tmp
    remote_src: true

- name: Install node_exporter binary
  ansible.builtin.copy:
    src: "/tmp/node_exporter-{{ node_exporter_version }}.linux-amd64/node_exporter"
    dest: /usr/local/bin/node_exporter
    mode: "0755"
    remote_src: true

- name: Create node_exporter systemd service
  ansible.builtin.copy:
    dest: /etc/systemd/system/node_exporter.service
    mode: "0644"
    content: |
      [Unit]
      Description=Prometheus Node Exporter
      After=network.target

      [Service]
      ExecStart=/usr/local/bin/node_exporter
      Restart=always

      [Install]
      WantedBy=multi-user.target

- name: Enable and start node_exporter
  ansible.builtin.service:
    name: node_exporter
    enabled: true
    state: started
    daemon_reload: true
