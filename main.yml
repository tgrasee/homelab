---
# Proxmox base configuration
# Removes enterprise repo, adds free repo, hardens SSH, sets up users

- name: Remove Proxmox enterprise repo
  file:
    path: /etc/apt/sources.list.d/pve-enterprise.list
    state: absent

- name: Add Proxmox no-subscription repo
  copy:
    dest: /etc/apt/sources.list.d/pve-no-subscription.list
    content: |
      deb http://download.proxmox.com/debian/pve bookworm pve-no-subscription

- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Install useful packages
  apt:
    name:
      - htop
      - curl
      - wget
      - vim
      - net-tools
      - git
    state: present

- name: Disable SSH password authentication
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^#?PasswordAuthentication"
    line: "PasswordAuthentication no"
  notify: Restart SSH

- name: Set timezone
  timezone:
    name: "America/New_York"   # Change to your timezone

handlers:
  - name: Restart SSH
    service:
      name: sshd
      state: restarted
